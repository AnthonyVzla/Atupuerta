<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda - Control de Red</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            alert("❌ EL NAVEGADOR DETECTÓ UN ERROR:\n\n" + message + "\n\nEn la línea: " + lineno);
            return false;
        };
    </script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">

    <nav class="bg-indigo-600 shadow-sm sticky top-0 z-50 text-white">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <span class="text-xl font-bold tracking-tight">A tu puerta <span class="text-xs bg-indigo-800 px-2 py-1 rounded ml-2">v3.0</span></span>
            <button onclick="document.getElementById('modal-admin-login').style.display = 'flex';" class="text-xs bg-white text-indigo-600 font-bold transition rounded py-2 px-3 hover:bg-gray-100 cursor-pointer">Admin</button>
        </div>
    </nav>

    <main id="vista-cliente" class="max-w-6xl mx-auto px-4 py-12">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-extrabold tracking-tight sm:text-5xl mb-4">Productos Exclusivos</h1>
            <p class="text-lg text-gray-600 max-w-2xl mx-auto">Monitoreo de inicialización en tiempo real.</p>
        </div>

        <div id="lista-productos" class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="text-center py-12 col-span-3 bg-white border border-gray-200 rounded-2xl p-6 shadow-sm">
                <p class="text-gray-500 font-bold animate-pulse text-lg">Cargando interfaz de usuario...</p>
                <p id="consola-debug" class="text-sm text-blue-600 mt-3 font-mono bg-blue-50 p-2 inline-block rounded border border-blue-200">
                    ⏳ Esperando que el motor JavaScript despierte...
                </p>
            </div>
        </div>
    </main>

    <div id="modal-admin-login" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" style="display: none;">
        <div class="bg-white rounded-2xl max-w-sm w-full p-6 shadow-2xl relative">
            <button onclick="document.getElementById('modal-admin-login').style.display = 'none';" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-xl font-bold">&times;</button>
            <h2 class="text-xl font-bold mb-6 text-center text-gray-800">Acceso Administrador</h2>
            <form onsubmit="loginAdmin(event)" class="space-y-4">
                <div>
                    <input type="email" id="admin-email" placeholder="Correo electrónico" required class="w-full px-4 py-2 border border-gray-300 rounded-lg outline-none">
                </div>
                <div>
                    <input type="password" id="admin-password" placeholder="Contraseña" required class="w-full px-4 py-2 border border-gray-300 rounded-lg outline-none">
                </div>
                <button type="submit" id="btn-login-submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 rounded-lg transition cursor-pointer">Ingresar</button>
            </form>
        </div>
    </div>

    <div id="vista-admin" class="max-w-6xl mx-auto px-4 py-12" style="display: none;">
        <div class="flex items-center justify-between border-b pb-6 mb-8">
            <h1 class="text-3xl font-extrabold">Panel Administrativo</h1>
            <button onclick="window.location.reload()" class="bg-gray-200 px-4 py-2 rounded-lg text-sm">Salir</button>
        </div>
        <div class="bg-white p-6 rounded-xl border text-center">
            <p class="text-emerald-600 font-bold">✓ Conexión establecida con éxito.</p>
        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://dvkusfutsnygppvtbxmg.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR2a3VzZnV0c255Z3BwdnRieG1nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NDUwMjksImV4cCI6MjA5NjMyMTAyOX0.ZTBkpZrdZ0K0KFXGSrd2TIkKHRJcP52k0Ioy1cQFeJI";
        
        let supabase = null;

        // Función segura para actualizar el estado en pantalla sin importar el orden de carga
        function reportarEstado(texto, esError = false) {
            console.log(texto);
            const selector = document.getElementById('consola-debug');
            if (selector) {
                selector.innerText = texto;
                if (esError) {
                    selector.className = "text-sm text-red-600 mt-3 font-mono bg-red-50 p-2 inline-block rounded border border-red-200";
                }
            }
        }

        // Forzar la ruptura de solicitudes colgadas en la red
        function conTimeout(promesa, ms = 8000) {
            return Promise.race([
                promesa,
                new Promise(function(_, reject) {
                    setTimeout(function() {
                        reject(new Error("Límite de tiempo agotado (La red no respondió)"));
                    }, ms);
                })
            ]);
        }

        // Inicialización obligatoria e inmediata
        async function arrancarSistema() {
            reportarEstado("🚀 Paso 1: Motor despierto. Buscando librerías externas...");
            
            const libSupabase = window.supabase || window.Supabase;
            if (!libSupabase) {
                reportarEstado("❌ Error: La librería de Supabase fue bloqueada o no cargó.", true);
                return;
            }

            try {
                reportarEstado("🔗 Paso 2: Librería encontrada. Creando enlace de conexión...");
                supabase = libSupabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                
                reportarEstado("📡 Paso 3: Buscando productos en la base de datos...");
                await solicitarInventario();
            } catch (err) {
                reportarEstado("💥 Fallo general en la carga: " + err.message, true);
            }
        }

        async function solicitarInventario() {
            if (!supabase) return;
            const contenedor = document.getElementById('lista-productos');
            try {
                const { data: productos, error } = await conTimeout(
                    supabase.from('productos').select('*'),
                    8000
                );
                
                if (error) {
                    contenedor.innerHTML = `<div class="p-4 bg-red-100 text-red-700 font-bold rounded-xl col-span-3 text-center text-xs font-mono">Supabase Error: ${error.message}</div>`;
                    return;
                }

                if (!productos || productos.length === 0) {
                    contenedor.innerHTML = `<div class="p-4 bg-yellow-50 text-yellow-800 border border-yellow-200 rounded-xl col-span-3 text-center font-bold">¡Conectado! Tu tabla 'productos' en Supabase existe pero no tiene filas agregadas.</div>`;
                    return;
                }

                contenedor.innerHTML = `<div class="p-4 bg-emerald-100 text-emerald-800 rounded-xl col-span-3 text-center font-bold">¡Éxito! Se sincronizaron ${productos.length} productos correctamente.</div>`;
            } catch (err) {
                contenedor.innerHTML = `
                    <div class="text-center py-6 col-span-3 bg-orange-50 text-orange-700 border border-orange-200 rounded-2xl p-6">
                        <p class="font-bold text-lg">⚠️ Conexión Interrumpida</p>
                        <p class="text-sm mt-1 text-gray-600">Tu proveedor de internet (CANTV/Línea móvil) dejó la consulta en espera y el script la detuvo para evitar que se congele.</p>
                        <p class="text-xs bg-gray-200 p-2 rounded mt-3 font-mono text-left text-gray-800">Causa: ${err.message}</p>
                    </div>`;
            }
        }

        async function loginAdmin(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-login-submit');
            const email = document.getElementById('admin-email').value;
            const password = document.getElementById('admin-password').value;

            btn.innerText = "PROCESANDO ACCESO...";
            btn.disabled = true;

            try {
                const { data, error } = await conTimeout(
                    supabase.auth.signInWithPassword({ email, password }),
                    8000
                );

                if (error) {
                    alert("Acceso denegado: " + error.message);
                    btn.innerText = "Ingresar";
                    btn.disabled = false;
                } else if (data && data.session) {
                    document.getElementById('modal-admin-login').style.display = 'none';
                    document.getElementById('vista-cliente').style.display = 'none';
                    document.getElementById('vista-admin').style.display = 'block';
                }
            } catch (err) {
                alert("Tiempo de espera agotado en Login:\n" + err.message);
                btn.innerText = "Ingresar";
                btn.disabled = false;
            }
        }

        // Ejecución forzada al cargar el script
        arrancarSistema();
    </script>
</body>
</html>
